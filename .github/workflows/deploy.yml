name: Deploy portfoliospring to Linode

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven (skip tests if needed)
        run: ./mvnw -B clean package -DskipTests

      - name: Find JAR and rename to match server path
        run: |
          JAR_FILE=$(ls target/*SNAPSHOT.jar 2>/dev/null || ls target/*.jar)
          echo "Using JAR: $JAR_FILE"
          cp "$JAR_FILE" portfoliospring-0.0.1-SNAPSHOT.jar
          ls -lh portfoliospring-0.0.1-SNAPSHOT.jar

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "portfoliospring-0.0.1-SNAPSHOT.jar"
          target: "/home/admin/portfoliospring/"

      - name: Restart portfoliospring service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart portfoliospring
            sleep 2
            sudo systemctl --no-pager -l status portfoliospring || true
